<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Admin Dashboard | Heranmoy Das</title>
    <link rel="shortcut icon" href="logoicon.jpg" type="image/x-icon">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            padding: 20px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-container h2 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .login-container input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .login-container input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .login-container input:focus {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .login-container button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ff6b6b, #ff8e53);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .login-container button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            background: linear-gradient(45deg, #ff8e53, #ff6b6b);
        }

        /* Admin Panel */
        .admin-panel {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease;
        }

        .admin-panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 25px 30px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            color: white;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header h1 i {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 50%;
            animation: spin 10s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .header button {
            background: rgba(255, 68, 68, 0.3);
            border: 2px solid rgba(255, 68, 68, 0.5);
            color: white;
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .header button:hover {
            background: rgba(255, 68, 68, 0.5);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,68,68,0.5);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s;
            animation: cardPop 0.5s ease;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        @keyframes cardPop {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, #ff6b6b, #ff8e53);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
        }

        .stat-info h3 {
            color: white;
            font-size: 32px;
            font-weight: 700;
        }

        .stat-info p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Search Bar */
        .search-container {
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            animation: slideRight 0.5s ease;
        }

        @keyframes slideRight {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .search-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .search-box i {
            color: white;
            font-size: 20px;
        }

        .search-box input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 0 30px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(180deg);
        }

        /* Users Table */
        .table-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            overflow-x: auto;
            animation: slideUp 0.6s ease;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        th {
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        td {
            padding: 15px;
            color: white;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        tr {
            transition: all 0.3s;
            animation: rowPop 0.3s ease;
        }

        @keyframes rowPop {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.01);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Password Cell */
        .password-cell {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            border-radius: 8px;
            color: #00ff00;
            font-family: monospace;
            font-size: 14px;
            display: inline-block;
            border: 1px solid #00ff00;
            box-shadow: 0 0 10px rgba(0,255,0,0.3);
        }

        /* User Avatar */
        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            border: 2px solid white;
        }

        /* Action Buttons */
        .action-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 14px;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .copy-btn {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(76,175,80,0.5);
        }

        /* Loading Spinner */
        .loading {
            text-align: center;
            padding: 50px;
        }

        .loading i {
            font-size: 50px;
            color: white;
            animation: spin 1s linear infinite;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            color: white;
            animation: slideUp 0.4s ease;
        }

        .modal-content h3 {
            margin-bottom: 20px;
            font-size: 24px;
        }

        .modal-content p {
            margin: 15px 0;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .modal-content strong {
            color: #ffd700;
        }
    </style>
</head>
<body>
    <!-- Login Container -->
    <div class="login-container" id="loginBox">
        <h2><i class="fas fa-lock"></i> Admin Access</h2>
        <input type="password" id="adminPass" placeholder="Enter Secret Key">
        <button onclick="login()">
            <i class="fas fa-sign-in-alt"></i> Enter Dashboard
        </button>
        <div style="color: #ff4444; text-align: center; margin-top: 15px; display: none;" id="errorMsg">
            <i class="fas fa-exclamation-circle"></i> Wrong password!
        </div>
    </div>

    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel">
        <div class="header">
            <h1>
                <i class="fas fa-crown"></i>
                User Management Dashboard
            </h1>
            <div style="display: flex; align-items: center; gap: 20px;">
                <span style="color: white;"><i class="fas fa-user"></i> Heranmoy</span>
                <button onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalUsers">0</h3>
                    <p>Total Users</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-key"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalPass">0</h3>
                    <p>Passwords Stored</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-calendar"></i>
                </div>
                <div class="stat-info">
                    <h3 id="todayJoin">0</h3>
                    <p>Joined Today</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="stat-info">
                    <h3 id="activeToday">0</h3>
                    <p>Active Today</p>
                </div>
            </div>
        </div>

        <div class="search-container">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by username, email, or UID..." onkeyup="searchUsers()">
            </div>
            <button class="refresh-btn" onclick="loadUsers()">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>

        <div class="table-container">
            <div id="loading" class="loading">
                <i class="fas fa-spinner"></i>
                <p style="color: white; margin-top: 15px;">Loading user data...</p>
            </div>
            <div id="usersTable" style="display: none;"></div>
        </div>
    </div>

    <!-- User Details Modal -->
    <div class="modal" id="userModal">
        <div class="modal-content" id="modalContent">
            <!-- Content will be filled by JavaScript -->
        </div>
    </div>

    <script>
        // Firebase Config - YOUR CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBMLnucxfbjXi0Lf0TZEjT1Nd_1aXihTv4",
            authDomain: "learningdb-2e196.firebaseapp.com",
            databaseURL: "https://learningdb-2e196-default-rtdb.firebaseio.com",
            projectId: "learningdb-2e196",
            storageBucket: "learningdb-2e196.firebasestorage.app",
            messagingSenderId: "298577512231",
            appId: "1:298577512231:web:87c2d751da7202d1f24b02"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allUsers = {};

        // Login Function
        function login() {
            const pass = document.getElementById('adminPass').value;
            if(pass === 'Shuvo2003') {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminPanel').classList.add('active');
                loadUsers();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('errorMsg').style.display = 'none';
                }, 3000);
            }
        }

        // Logout Function
        function logout() {
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('adminPanel').classList.remove('active');
            document.getElementById('adminPass').value = '';
        }

        // Load Users from Firebase
        function loadUsers() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('usersTable').style.display = 'none';

            db.ref('users').once('value', (snapshot) => {
                allUsers = snapshot.val() || {};
                displayUsers(allUsers);
                updateStats();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('usersTable').style.display = 'block';
            });
        }

        // Display Users in Table
        function displayUsers(users) {
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Avatar</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Password</th>
                            <th>UID</th>
                            <th>Created</th>
                            <th>Last Login</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            for(let uid in users) {
                let u = users[uid];
                let firstLetter = u.username ? u.username.charAt(0).toUpperCase() : '?';
                let created = u.createdAt ? new Date(u.createdAt).toLocaleString() : 'N/A';
                let lastLogin = u.lastLogin ? new Date(u.lastLogin).toLocaleString() : 'Never';

                html += `
                    <tr>
                        <td><div class="user-avatar">${firstLetter}</div></td>
                        <td><strong>${u.username || 'N/A'}</strong></td>
                        <td>${u.email || 'N/A'}</td>
                        <td><span class="password-cell">${u.password || 'No pass'}</span></td>
                        <td><small>${uid.substring(0, 8)}...</small></td>
                        <td><small>${created}</small></td>
                        <td><small>${lastLogin}</small></td>
                        <td>
                            <button class="action-btn" onclick="viewUser('${uid}')" title="View Details">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="copy-btn" onclick="copyPassword('${uid}')">
                                <i class="fas fa-copy"></i> Copy
                            </button>
                        </td>
                    </tr>
                `;
            }

            html += '</tbody></table>';
            document.getElementById('usersTable').innerHTML = html;
        }

        // Update Statistics
        function updateStats() {
            let total = Object.keys(allUsers).length;
            let passCount = 0;
            let todayCount = 0;
            let activeCount = 0;
            
            let today = new Date().toDateString();

            for(let uid in allUsers) {
                let u = allUsers[uid];
                
                if(u.password) passCount++;
                
                if(u.createdAt) {
                    let created = new Date(u.createdAt).toDateString();
                    if(created === today) todayCount++;
                }
                
                if(u.lastLogin) {
                    let last = new Date(u.lastLogin).toDateString();
                    if(last === today) activeCount++;
                }
            }

            document.getElementById('totalUsers').innerHTML = total;
            document.getElementById('totalPass').innerHTML = passCount;
            document.getElementById('todayJoin').innerHTML = todayCount;
            document.getElementById('activeToday').innerHTML = activeCount;
        }

        // Search Users
        function searchUsers() {
            let search = document.getElementById('searchInput').value.toLowerCase();
            
            if(!search) {
                displayUsers(allUsers);
                return;
            }

            let filtered = {};
            for(let uid in allUsers) {
                let u = allUsers[uid];
                if(uid.toLowerCase().includes(search) ||
                   (u.username && u.username.toLowerCase().includes(search)) ||
                   (u.email && u.email.toLowerCase().includes(search))) {
                    filtered[uid] = u;
                }
            }
            displayUsers(filtered);
        }

        // View User Details
        function viewUser(uid) {
            let u = allUsers[uid];
            let modal = document.getElementById('userModal');
            let content = document.getElementById('modalContent');

            content.innerHTML = `
                <h3><i class="fas fa-user-circle"></i> User Details</h3>
                <p><strong>Username:</strong> ${u.username || 'N/A'}</p>
                <p><strong>Email:</strong> ${u.email || 'N/A'}</p>
                <p><strong>Password:</strong> <span style="color: #00ff00;">${u.password || 'N/A'}</span></p>
                <p><strong>UID:</strong> ${uid}</p>
                <p><strong>Created:</strong> ${u.createdAt ? new Date(u.createdAt).toLocaleString() : 'N/A'}</p>
                <p><strong>Last Login:</strong> ${u.lastLogin ? new Date(u.lastLogin).toLocaleString() : 'Never'}</p>
                <button class="copy-btn" style="width:100%; margin-top:15px;" onclick="copyPassword('${uid}')">
                    <i class="fas fa-copy"></i> Copy Password
                </button>
                <button class="action-btn" style="width:100%; margin-top:10px;" onclick="closeModal()">
                    <i class="fas fa-times"></i> Close
                </button>
            `;

            modal.classList.add('active');
        }

        // Copy Password
        function copyPassword(uid) {
            let pass = allUsers[uid].password;
            if(pass) {
                navigator.clipboard.writeText(pass);
                alert('✅ Password copied to clipboard!');
            }
        }

        // Close Modal
        function closeModal() {
            document.getElementById('userModal').classList.remove('active');
        }

        // Click outside modal to close
        document.getElementById('userModal').addEventListener('click', (e) => {
            if(e.target === document.getElementById('userModal')) {
                closeModal();
            }
        });

        // Enter key for login
        document.getElementById('adminPass').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') login();
        });

        // Escape key to close modal
        document.addEventListener('keydown', (e) => {
            if(e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
